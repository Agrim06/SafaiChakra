version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: safaichakra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: safaichakra
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expose locally so you can still use pgAdmin etc.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safaichakra_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env          # keeps secrets out of this file
    environment:
      # Override DATABASE_URL so it points to the 'db' service above.
      # Comment this out if you want to use the Supabase URL in .env instead.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/safaichakra
      ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safaichakra_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
