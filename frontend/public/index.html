<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="description" content="SafaiChakra — AI-Powered Smart Waste Management Dashboard" />
    <title>SafaiChakra</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { inter: ['Inter', 'sans-serif'] },
            colors: {
              surface: '#0a0f1e',
              card: '#111827',
              border: '#1f2937',
            },
          },
        },
      }
    </script>

    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #0a0f1e; font-family: 'Inter', sans-serif; }
      .leaflet-container { background: #111827 !important; }
      @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      .pulse-dot { animation: pulse-dot 1.8s ease-in-out infinite; }
      @keyframes fill-rise { from { height: 0%; } }
      .fill-bar { animation: fill-rise 1.2s cubic-bezier(.4,0,.2,1) forwards; }
      @keyframes slide-in { from { opacity: 0; transform: translateY(12px); } }
      .slide-in { animation: slide-in 0.5s ease forwards; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
