<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="SafaiChakra — AI-Powered Smart Waste Management Dashboard" />
    <title>SafaiChakra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { inter: ['Inter', 'sans-serif'] },
            colors: {
              surface: 'var(--color-bg)',
              card: 'var(--color-surface)',
              border: 'var(--color-card-border)',
            },
          },
        },
      }
    </script>

    <script>
      /**
       * INITIAL THEME SCRIPT
       * Detects saved preference and applies the data-theme attribute 
       * to prevent flash of unstyled content (FOUC).
       */
      const savedTheme = localStorage.getItem('safai-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>
  </body>
</html>
